<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 응용과 이해-1장</title>
<style>
/* 디자인 및 레이아웃 유지 */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#90cde7;min-height:100vh;padding:2rem 1rem;display:flex;justify-content:center}
.wrap{max-width:800px;width:100%}
.header{background:#fff;border-radius:16px;border:1px solid #e0ddd5;padding:1.5rem 2rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
h1{font-size:22px;color:#1a1a18;margin-bottom:6px}
.subtitle{font-size:14px;color:#888780}
.progress-wrap{background:#fff;border-radius:16px;border:1px solid #e0ddd5;padding:1rem 2rem;margin-bottom:1rem;display:flex;align-items:center;gap:16px}
.prog-bar-bg{flex:1;background:#f1efe8;border-radius:99px;height:8px}
.prog-bar-fill{height:8px;border-radius:99px;background:#1D9E75;transition:width .4s;width:0%}
.prog-text{font-size:13px;color:#888780;white-space:nowrap;min-width:60px;text-align:right}
.score-badge{font-size:13px;font-weight:600;color:#185FA5;background:#E6F1FB;padding:4px 12px;border-radius:99px}
.card{background:#fff;border-radius:16px;border:1px solid #e0ddd5;padding:2.5rem;margin-bottom:1rem;position:relative}
.type-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.type-mc{background:#E6F1FB;color:#185FA5}
.type-ox{background:#EAF3DE;color:#3B6D11}
.type-blank{background:#FBEAF0;color:#72243E}
.cat-badge{display:inline-block;font-size:12px;padding:2px 10px;border-radius:99px;background:#f1efe8;color:#5F5E5A;margin-left:8px}
.q-text{font-size:18px;font-weight:700;color:#1a1a18;line-height:1.6;margin-bottom:1.5rem}
.opts{display:grid;gap:10px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border:1px solid #d3d1c7;border-radius:12px;background:#fff;cursor:pointer;font-size:15px;color:#1a1a18;text-align:left;transition:all .15s;width:100%}
.opt-btn:hover:not(:disabled){background:#f8f8f7;border-color:#1a1a18}
.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A;font-weight:600}
.opt-btn.wrong{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.feedback{margin-top:1.5rem;padding:16px;border-radius:12px;font-size:14px;line-height:1.7;display:none;border:1px solid transparent}
.feedback.show{display:block}
.feedback.correct{background:#F3F9EB;color:#27500A;border-color:#E2EFD1}
.feedback.wrong{background:#FFF0F0;color:#791F1F;border-color:#F9E2E2}
.blank-input{padding:10px;border:2px solid #d3d1c7;border-radius:8px;font-size:16px;width:200px;margin:10px 0;outline:none}
.next-btn{margin-top:1.5rem;padding:12px 30px;background:#1a1a18;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600;display:none}
.result-box{text-align:center}
.result-score{font-size:54px;font-weight:900;margin-bottom:10px}
.restart-btn{margin-top:20px;padding:12px 40px;background:#1D9E75;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🎲 AI 응용과 이해-1장</h1>
    <p class="subtitle">인공지능과 미래-1 · 총 50문제 · 사지선다 / OX / 순서배열 / 빈칸완성 / 매칭</p>
  </div>
  <div class="progress-wrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill"></div></div>
    <span class="prog-text" id="prog-text">0 / 50</span>
    <span class="score-badge" id="score-badge">현재 0점</span>
  </div>//인공지능과 미래 · 총 50문제 · 사지선다 / OX / 순서배열 / 빈칸완성 / 매칭
  <div id="quiz-area"></div>
</div>

<script>
// --- 50문제 데이터 ---
const ALL_DATA = [
  // 1-15: 64, 65, 66P 요약 기반 핵심 문항
  {type:'mc',cat:'요약-정의',q:'인공지능(AI)의 가장 정확한 학문적 정의는?',opts:['기계가 스스로 자아를 갖게 하는 공학','인간의 지능을 모방하는 기계나 소프트웨어를 만드는 학문','단순 반복 업무를 기계화하는 자동화 기술','인간의 뇌 세포를 배양하여 기계에 이식하는 생명공학'],ans:1,exp:'AI는 인간의 지능을 모방하는 기술입니다. [교안 64P 요약]'},
  {type:'mc',cat:'요약-지능',q:'교안에서 정의한 "지능"의 4가지 특징에 포함되지 않는 것은?',opts:['학습 (Learning)','상황 이해 및 문제해결','추론 (Reasoning)','도덕적 양심 (Conscience)'],ans:3,exp:'지능의 특징은 학습, 문제해결, 빅데이터, 추론 등입니다. [교안 64P 요약]'},
  {type:'mc',cat:'요약-관점',q:'AI를 정의하는 4대 관점 중 "생각"의 영역에 해당하는 두 가지는?',opts:['인간처럼 사고하기, 합리적으로 사고하기','인간처럼 행동하기, 합리적으로 행동하기','인간처럼 사고하기, 합리적으로 행동하기','감정적으로 사고하기, 합리적으로 행동하기'],ans:2,exp:'AI는 사고하기(Thinking)와 행동하기(Acting)의 각 2가지 관점으로 정의됩니다. [교안 64P 요약]'},
  {type:'mc',cat:'요약-관계',q:'인공지능(AI), 머신러닝(ML), 딥러닝(DL)의 포함 관계가 옳은 것은?',opts:['DL ⊂ ML ⊂ AI','AI ⊂ ML ⊂ DL','ML ⊂ AI ⊂ DL','세 분야는 독립적이다'],ans:0,exp:'가장 큰 범주는 AI이며, 그 안에 ML, 그 안에 DL이 포함됩니다. [교안 64P 요약]'},
  {type:'mc',cat:'요약-역사',q:'"인공지능"이라는 용어가 공식적으로 처음 사용된 사건은?',opts:['1950년 튜링 테스트 발표','1956년 다트머스 학술 회의','2016년 알파고 대국','1943년 신경망 논문 발표'],ans:1,exp:'1956년 다트머스 회의에서 용어가 탄생했습니다. [교안 65P 요약]'},
  {type:'mc',cat:'요약-겨울',q:'1970년대 "첫 번째 AI 겨울"이 발생한 주된 원인은?',opts:['데이터 보안 사고의 발생','지나친 낙관으로 약속된 결과가 실현되지 않음','하드웨어 부품의 공급 중단','컴퓨터 바이러스의 확산'],ans:1,exp:'초기 연구자들의 장밋빛 낙관주의가 현실적 한계에 부딪혔기 때문입니다. [교안 65P 요약]'},
  {type:'mc',cat:'요약-겨울',q:'1990년대 "두 번째 AI 겨울"을 경험하게 된 배경은?',opts:['인터넷 속도가 너무 느렸기 때문','기대에 미치지 못한 성과와 실용성 문제','전문가들이 AI 연구를 거부했기 때문','로봇의 반란 시도'],ans:1,exp:'성과가 기대치를 충족하지 못했습니다. [교안 65P 요약]'},
  {type:'mc',cat:'요약-부흥',q:'최근 인공지능이 다시 부흥하게 된 "3대 핵심 요인"이 아닌 것은?',opts:['딥러닝 알고리즘의 발전','빅데이터의 급증','컴퓨팅 성능(GPU 등)의 향상','기호주의 추론 엔진의 완성'],ans:3,exp:'현재의 부흥은 딥러닝, 데이터, 연산 성능 덕분입니다. [교안 66P 요약]'},
  {type:'mc',cat:'요약-응용',q:'교안에서 언급한 AI가 활발히 사용되는 분야가 아닌 것은?',opts:['자율주행차 및 의료 진단','번역 서비스 및 챗봇','과거 역사 유물 복원','예술과 문학'],ans:2,exp:'66P 요약의 주요 사례는 주행, 의료, 번역, 챗봇입니다. [교안 66P 요약]'},
  {type:'mc',cat:'요약-로봇',q:'"로봇(Robot)"이라는 용어를 처음 소개한 인물과 작품은?',opts:['아이작 아시모프 - 아이, 로봇','카렐 차페크 - 연극 R.U.R.','앨런 튜링 - 계산 기계와 지능','필립 K. 딕 - 블레이드 러너'],ans:1,exp:'1920년 카렐 차페크가 소개했습니다. [교안 66P 요약]'},
  {type:'ox',cat:'요약-윤리',q:'아이작 아시모프는 로봇이 인간에게 해를 입히지 않아야 한다는 내용을 담은 "로봇 3원칙"을 제시했다.',ans:'O',exp:'아시모프의 3원칙은 AI 윤리의 기초입니다. [교안 66P 요약]'},
  {type:'ox',cat:'요약-역사',q:'초기 AI 연구는 기호주의 AI와 비기호주의 AI(신경망) 두 갈래를 바탕으로 진행되었다.',ans:'O',exp:'두 방식이 상호 경쟁하며 발전했습니다. [교안 65P 요약]'},
  {type:'blank',cat:'요약-정의',q:'지능은 <input class="blank-input" id="b1" type="text" name="" value="" disabled>를 학습하고 상황을 이해하며 주어진 문제를 해결하는 능력이다.',ans:'데이터',exp:'데이터 학습은 지능의 핵심 출발점입니다. [교안 64P 요약]'},
  {type:'mc',cat:'요약-현황',q:'최근 AI 기술의 트렌드로, 텍스트/이미지/음악 등을 스스로 만드는 기술의 명칭은?',opts:['자동형 AI','수동형 AI','생성형 AI','분류형 AI'],ans:2,exp:'생성형 AI가 현재의 혁신을 이끌고 있습니다. [교안 64P 요약]'},
  {type:'mc',cat:'요약-성공',q:'최근 딥러닝 부흥에 기여한 컴퓨팅 하드웨어의 대표 주자는?',opts:['CPU','GPU','HDD','MODEM'],ans:1,exp:'GPU의 병렬 연산 능력이 딥러닝을 가능하게 했습니다. [교안 66P 요약]'},

  // 16-50: 교안 전체 범위 기반 (역사, 응용, 윤리)
  {type:'mc',cat:'역사-터크',q:'18세기 "터크"라는 체스 기계의 실제 비밀은?',opts:['최초의 증기 엔진 적용','태엽식 초소형 컴퓨터 내장','내부에 사람이 숨어 조작함','자석의 원리를 이용한 자동화'],ans:2,exp:'터크는 사람이 조작한 속임수였지만 AI에 대한 상상을 자극했습니다. [교안 3P]'},
  {type:'mc',cat:'역사-헤론',q:'기원전 3세기, 증기를 이용해 스스로 열리는 자동문을 고안한 인물은?',opts:['아르키메데스','헤론','피타고라스','유클리드'],ans:1,exp:'헤론은 자동기계에 대한 오랜 갈망을 보여줍니다. [교안 18P]'},
  {type:'mc',cat:'역사-드로',q:'18세기 시계 제작자 자케 드로가 만든 복잡한 자동 인형의 특징은?',opts:['직접 말을 할 수 있었다','펜을 들고 실제로 글을 썼다','체스 대국에서 승리했다','스스로 길을 찾아 걸어갔다'],ans:1,exp:'드로의 작가 인형은 기계 장치로 글을 썼습니다. [교안 19P]'},
  {type:'blank',cat:'역사-배비지',q:'찰스 배비지가 설계한 사상 최초의 범용 컴퓨터 개념 장치는 <input class="blank-input" id="b2" type="text" name="" value="disabled test" disabled> 기관이다.',ans:'해석',exp:'해석 기관(Analytical Engine)은 현대 컴퓨터의 조상입니다. [교안 20P]'},
  {type:'mc',cat:'역사-에이다',q:'에이다 러브레이스가 인공지능 역사에서 갖는 중요한 의의는?',opts:['최초로 실용적인 로봇을 제작함','기계가 음악과 예술도 창조할 수 있음을 예견함','트랜지스터를 발명함','인터넷의 기본 구조를 설계함'],ans:1,exp:'수학을 넘어선 기계의 잠재력을 이해한 최초의 프로그래머입니다. [교안 21P]'},
  {type:'mc',cat:'역사-튜링',q:'앨런 튜링이 제안한, 기계와 사람을 구분할 수 없다면 지능이 있다고 보는 테스트는?',opts:['다트머스 테스트','알파고 테스트','튜링 테스트','에이다 테스트'],ans:2,exp:'튜링 테스트는 "인간처럼 행동하기"의 기준을 제시했습니다. [교안 23P]'},
  {type:'ox',cat:'역사-신경망',q:'1943년 매컬러와 피츠는 뉴런 네트워크가 간단한 논리 기능을 수행할 수 있음을 보여주었다.',ans:'O',exp:'인공신경망 연구의 시초가 되었습니다. [교안 28P]'},
  {type:'mc',cat:'역사-퍼셉트론',q:'1957년 프랭크 로젠블랫이 개발한 초기 신경망 모델의 이름은?',opts:['전문가 시스템','퍼셉트론','홉필드 넷','알렉스넷'],ans:1,exp:'퍼셉트론은 시각 패턴 인식을 위해 설계된 초기 모델입니다. [교안 29P]'},
  {type:'mc',cat:'역사-전문가',q:'1차 겨울 이후 특정 도메인의 지식을 활용해 의사결정을 내린 시스템은?',opts:['자율주행 시스템','전문가 시스템','창작형 시스템','범용 지능 시스템'],ans:1,exp:'전문가 시스템은 지식 베이스와 추론 엔진으로 구성됩니다. [교안 31P]'},
  {type:'blank',cat:'역사-알고리즘',q:'신경망 학습의 핵심 알고리즘으로 제프리 힌튼이 대중화시킨 것은 <input class="blank-input" id="b3" type="text" name="" value="disabled test" disabled>이다.',ans:'역전파',exp:'역전파(Backpropagation)로 심층 신경망 학습이 가능해졌습니다. [교안 33P]'},
  {type:'mc',cat:'역사-노벨상',q:'인공 신경망 연구 공로로 2024년 노벨 물리학상을 수상한 인물들은?',opts:['존 매카시와 마빈 민스키','앨런 튜링과 에이다 러브레이스','존 홈필드와 제프리 힌튼','일론 머스크와 샘 알트만'],ans:2,exp:'존 홈필드와 제프리 힌튼이 머신러닝 기초 연구로 수상했습니다. [교안 34P]'},
  {type:'mc',cat:'역사-2012',q:'2012년 이미지 인식 경진대회(ILSVRC)에서 딥러닝 열풍을 촉발시킨 모델은?',opts:['알파고','ChatGPT','알렉스넷 (AlexNet)','VGGNet'],ans:2,exp:'알렉스넷의 압도적 우승으로 딥러닝 시대가 열렸습니다. [교안 39P]'},
  {type:'ox',cat:'역사-알파고',q:'2016년 알파고는 이세돌 9단과의 바둑 대국에서 4-1로 승리했다.',ans:'O',exp:'전 세계에 AI의 충격을 안긴 사건입니다. [교안 40P]'},
  {type:'mc',cat:'역사-기호주의',q:'기호주의 AI에서 경우의 수가 기하급수적으로 늘어나 해결이 불가능해지는 현상은?',opts:['데이터 증발','조합 폭발','추론 마비','기호 고립'],ans:1,exp:'조합 폭발은 초기 탐색 알고리즘의 한계였습니다. [교안 27P]'},

// --- 셔플 알고리즘 (Fisher-Yates) ---
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// 초기화 시 섞기
let ALL = shuffle([...ALL_DATA]);
let cur = 0, score = 0, TOTAL = ALL.length;
const typeNames = {mc:'사지선다', ox:'OX 퀴즈', blank:'빈칸 완성'};

function restartQuiz(){ 
  ALL = shuffle([...ALL_DATA]); // 다시 시작할 때 또 섞기
  cur = 0; score = 0;
  document.getElementById('prog-fill').style.width = '0%';
  nextQ(); 
}

function nextQ(){
  if(cur >= TOTAL) { showResult(); return; }
  renderQ(ALL[cur]);
  updateProg();
}

function updateProg(){
  const pct = (cur / TOTAL * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = cur + ' / ' + TOTAL;
  document.getElementById('score-badge').textContent = '현재 ' + score + '점';
}

function renderQ(q){
  let html = `<div class="card">
    <span class="type-tag type-${q.type}">${typeNames[q.type]}</span>
    <span class="cat-badge">${q.cat}</span>
    <div class="q-text">${cur+1}. ${q.q}</div>`;
  
  if(q.type === 'mc'){
    html += `<div class="opts">` + q.opts.map((o,i)=>`<button class="opt-btn mc-btn" onclick="checkMC(${i})"><span>${i+1}.</span> ${o}</button>`).join('') + `</div>`;
  } else if(q.type === 'ox'){
    html += `<div style="display:flex;gap:20px">
      <button class="opt-btn ox-btn" style="flex:1;justify-content:center;font-size:24px" onclick="checkOX('O')">O</button>
      <button class="opt-btn ox-btn" style="flex:1;justify-content:center;font-size:24px" onclick="checkOX('X')">X</button>
    </div>`;
  } else if(q.type === 'blank'){
    html += `<input type="text" class="blank-input" id="blank-field" placeholder="정답 입력...">
             <button class="next-btn" style="display:block;margin-top:10px" id="check-blank-btn" onclick="checkBlank()">정답 확인</button>`;
  }
  
  html += `<div class="feedback" id="fb"></div>
           <button class="next-btn" id="next-btn" onclick="cur++; nextQ()">다음 문제</button></div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function checkMC(idx){
  const q = ALL[cur];
  const btns = document.querySelectorAll('.mc-btn');
  btns.forEach(b => b.disabled = true);
  if(idx === q.ans){ score++; showFB(true, q.exp); }
  else { btns[idx].classList.add('wrong'); showFB(false, q.exp); }
  btns[q.ans].classList.add('correct');
}

function checkOX(val){
  const q = ALL[cur];
  const btns = document.querySelectorAll('.ox-btn');
  btns.forEach(b => b.disabled = true);
  if(val === q.ans){ score++; showFB(true, q.exp); }
  else { showFB(false, q.exp); }
  btns[val === 'O' ? 0 : 1].classList.add(val === q.ans ? 'correct' : 'wrong');
  if(val !== q.ans) btns[q.ans === 'O' ? 0 : 1].classList.add('correct');
}

function checkBlank(){
  const q = ALL[cur];
  const input = document.getElementById('blank-field');
  const btn = document.getElementById('check-blank-btn');
  if(input.value.trim() === q.ans){ score++; showFB(true, q.exp); }
  else { showFB(false, q.exp + " (정답: " + q.ans + ")"); }
  input.disabled = true;
  btn.style.display = 'none';
}

function showFB(isCorrect, text){
  const fb = document.getElementById('fb');
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect ? '<b>✅ 정답입니다!</b><br>' : '<b>❌ 오답입니다.</b><br>') + text;
  document.getElementById('next-btn').style.display = 'block';
  window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

function showResult(){
  const pct = Math.round(score/TOTAL*100);
  document.getElementById('quiz-area').innerHTML = `<div class="card result-box">
    <div class="result-score">${score}<span style="font-size:24px;color:#888780"> / ${TOTAL}</span></div>
    <div style="font-size:18px;margin-bottom:20px">최종 정답률: ${pct}%</div>
    <p>${pct >= 80 ? '훌륭합니다! 시험 준비가 완벽하네요.' : '틀린 문제를 다시 확인하고 복습해보세요.'}</p>
    <button class="restart-btn" onclick="restartQuiz()">새로운 순서로 다시 도전</button>
  </div>`;
  document.getElementById('prog-fill').style.width = '100%';
}

nextQ();
</script>
